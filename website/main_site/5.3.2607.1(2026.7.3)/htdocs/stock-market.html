    <style>
        /* 页面特有样式 */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stock-card {
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stock-card .stock-code {
            font-size: 20px;
            font-family: 'Courier New', monospace;
            color: var(--text-color);
            opacity: 0.6;
            margin-bottom: 8px;
        }
        
        .stock-card .stock-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary-color);
        }
        
        .stock-card .stock-price {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .stock-card .stock-change {
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .stock-card .stock-change.positive {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        .stock-card .stock-change.negative {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        /* 搜索框区域 - 添加下拉建议样式 */
        .stock-search-section {
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .search-box-wrapper {
            display: flex;
            gap: 10px;
            align-items: stretch;
            position: relative;
        }
        
        /* 搜索建议下拉框 */
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 12px var(--shadow-color);
            z-index: 100;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            animation: slideDown 0.3s ease;
        }
        
        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background-color 0.2s;
        }
        
        .suggestion-item:last-child {
            border-bottom: none;
        }
        
        .suggestion-item:hover {
            background-color: var(--secondary-color);
        }
        
        .suggestion-code {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            min-width: 70px;
        }
        
        .suggestion-name {
            flex: 1;
            font-size: 14px;
        }
        
        .suggestion-price {
            font-size: 13px;
            font-weight: 500;
            min-width: 80px;
            text-align: right;
        }
        
        .suggestion-price .positive {
            color: #10b981;
        }
        
        .suggestion-price .negative {
            color: #ef4444;
        }
        
        .no-suggestion {
            padding: 12px 16px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.7;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .holdings-section {
            margin-top: 30px;
        }
        
        .holdings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .holding-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }
        
        .holding-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-color);
        }
        
        .holding-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .holding-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .holding-code {
            font-size: 20px;

            opacity: 0.6;
        }
        
        .holding-details {
            display: grid;

        .holding-detail-item {

        .holding-detail-label {

        }
        
        .holding-detail-value {

        }
        
        .profit-positive {
            color: #10b981;
        }
        
        .profit-negative {
            color: #ef4444;
        }
        
        .sell-btn {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sell-btn:hover {
            background: var(--card-hover-color);

        .modal-chart {

        .company-description {

        .trade-form {

        }
        
        .trade-form .form-group {

            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .trade-form input {

            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .current-holding-info {
            background: var(--secondary-color);

            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .empty-holdings {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
            opacity: 0.7;
        }
        
        .stock-card {
            animation: fadeInUp 0.5s ease forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .refresh-btn {
            background: var(--primary-color);
            color: white;
            margin-left: 10px;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        /* 倒计时徽章样式 */
        .countdown-badge {
            background: var(--secondary-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-left: 15px;
        }
        
        /* 头部右侧样式 */
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>

    <!-- 统一UI脚本 -->

    <script>
        // ==================== 全局变量 ====================
        let currentUser = null;
        let isLoggedIn = false;
        let stocksData = [];
        let holdingsData = [];
        let currentChart = null;
        let currentStockCode = null;
        let currentTradeType = null;
        let currentHoldingsForStock = [];
        let loadFailed = false;
        let currentDisplayStocks = [];
        
        // 倒计时相关变量
        let countdown = 30;
        let countdownInterval = null;
        let isUpdating = false;
        const UPDATE_URL = 'https://dornhub.eu.org/php/stock_update_cron.php?key=DornStock2024';
        const ORIGINAL_TITLE = '𣿅国股市 - 股票模拟交易';
        
        // 卖出相关变量
        let currentSellHoldingId = null;
        let currentSellStockCode = null;
        
        const UI = window.UI;
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化 LoginModule
            LoginModule.init('.header-right');
            
            // 监听登录事件
            document.addEventListener('userLoggedIn', function(e) {
                currentUser = e.detail.user;
                isLoggedIn = true;
                updateUserDisplay();
                loadFailed = false;
                loadStocks();
                loadHoldings();
                if (UI && UI.success) {
                    UI.success('登录成功！');
                }
            });
            
            document.addEventListener('userLoggedOut', function() {
                currentUser = null;
                isLoggedIn = false;
                updateUserDisplay();
                holdingsData = [];
                renderHoldings();
                if (UI && UI.info) {
                    UI.info('已退出登录');
                }
            });
            
            // 检查已有登录状态
            if (LoginModule.isLoggedIn()) {
                currentUser = LoginModule.getCurrentUser();
                isLoggedIn = true;
                updateUserDisplay();
                loadStocks();
                loadHoldings();
            } else {
                updateUserDisplay();
                document.getElementById('holdingsContainer').innerHTML = '<div class="empty-holdings">请先登录查看持仓</div>';
                loadStocks();
            }
            
            bindEvents();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            startCountdown();
        });
        
        // ==================== 倒计时与自动刷新 ====================
        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (countdown <= 1) {
                    updateMarketData();
                    countdown = 30;
                } else {
                    countdown--;
                }
                updateTitleAndBadge();
            }, 1000);
        }
        
        function updateTitleAndBadge() {
            document.title = `[${countdown}s] ${ORIGINAL_TITLE}`;
            const badge = document.getElementById('countdownBadge');
            if (badge) {
                badge.textContent = `下次刷新: ${countdown}s`;
            }
        }
        
        async function updateMarketData() {
            if (isUpdating) return;
            isUpdating = true;
            
            try {
                const response = await fetch(UPDATE_URL);
                const result = await response.json();
                
                if (result.success && result.updated_count > 0) {
                    await loadStocks();
                    if (isLoggedIn) await loadHoldings();
                    if (UI && UI.success) {
                        UI.success(`市场已更新，${result.updated_count}支股票价格变动`);
                    }
                } else if (result.success && result.updated_count === 0) {
                    console.log('市场无变化');
                } else {
                    throw new Error(result.error || '更新失败');
                }
            } catch (error) {
                console.error('市场更新失败:', error);
                if (UI && UI.error) {
                    UI.error('市场更新失败，请检查网络');
                }
            } finally {
                isUpdating = false;
            }
        }
        
        // ==================== 搜索建议功能 ====================
        function updateSearchSuggestions() {
            const keyword = document.getElementById('stockSearchInput').value.toLowerCase().trim();
            const suggestionsDiv = document.getElementById('searchSuggestions');
            
            if (!keyword) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const matches = stocksData.filter(stock => {
                const info = stockList.find(s => s.id === stock.code);
                const name = info ? info.name.toLowerCase() : '';
                const desc = info ? info.description.toLowerCase() : '';
                return stock.code.toLowerCase().includes(keyword) || 
                       name.includes(keyword) || 
                       desc.includes(keyword);
            });
            
            if (matches.length === 0) {
                suggestionsDiv.innerHTML = '<div class="no-suggestion"><i class="fas fa-search"></i> 未找到匹配的股票</div>';
                suggestionsDiv.style.display = 'block';
                return;
            }
            
            const displayMatches = matches.slice(0, 8);
            
            suggestionsDiv.innerHTML = displayMatches.map(stock => {
                const info = stockList.find(s => s.id === stock.code);
                const name = info ? info.name : stock.code;
                const changeClass = stock.change_percent >= 0 ? 'positive' : 'negative';
                const changeSign = stock.change_percent >= 0 ? '+' : '';
                
                return `
                    <div class="suggestion-item" data-code="${stock.code}">
                        <span class="suggestion-code">${escapeHtml(stock.code)}</span>
                        <span class="suggestion-name">${escapeHtml(name)}</span>
                        <span class="suggestion-price">
                            ${stock.current_price.toFixed(2)} 
                            <span class="${changeClass}">${changeSign}${stock.change_percent.toFixed(2)}%</span>
                        </span>
                    </div>
                `;
            }).join('');
            
            suggestionsDiv.style.display = 'block';
            
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    const code = item.getAttribute('data-code');
                    showStockDetail(code);
                    suggestionsDiv.style.display = 'none';
                    document.getElementById('stockSearchInput').value = '';
                });
            });
        }
        
        // ==================== 用户相关函数 ====================
        function updateUserDisplay() {
            // LoginModule 自动处理下拉菜单显示
            // 这里只更新页面特定元素
            const insiderBadges = document.querySelectorAll('.insider-badge');
            
            if (isLoggedIn && currentUser) {
                insiderBadges.forEach(b => b.style.display = 'inline-block');
            } else {
                insiderBadges.forEach(b => b.style.display = 'none');
            }
        }
        
        // ==================== 股票数据加载 ====================
        let isFirstLoad = true;
        
        async function loadStocks() {
            if (loadFailed) {
                console.log('加载已失败，停止重试');
                return;
            }
            
            try {
                const response = await fetch('https://dornhub.eu.org/php/stock_api.php?action=get_stocks');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('服务器返回的不是 JSON 格式');
                }
                
                const result = await response.json();
                
                if (result.success) {
                    stocksData = result.data.map(stock => ({
                        ...stock,
                        current_price: parseFloat(stock.current_price) || 0,
                        initial_price: parseFloat(stock.initial_price) || 0,
                        change_percent: parseFloat(stock.change_percent) || 0
                    }));
                    
                    renderStockGrid(isFirstLoad);
                    isFirstLoad = false;
                    loadFailed = false;
                } else {
                    throw new Error(result.error || '获取股票数据失败');
                }
            } catch (error) {
                console.error('加载股票失败:', error);
                loadFailed = true;
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                const grid = document.getElementById('stockGrid');
                grid.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ef4444;"></i>
                        <p style="margin-top: 16px;">加载股票数据失败</p>
                        <p style="font-size: 14px; opacity: 0.7;">${error.message}</p>
                        <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 16px;">
                            <i class="fas fa-sync-alt"></i> 刷新页面重试
                        </button>
                    </div>
                `;
                if (UI) UI.error('加载股票数据失败，请刷新页面重试');
            }
        }
        
        function renderStockGrid(shouldRandomize = true) {
            const grid = document.getElementById('stockGrid');
            if (!stocksData.length) {
                grid.innerHTML = '<div class="no-results">暂无股票数据</div>';
                return;
            }
            
            const displayStocks = stocksData.map(stock => {
                const info = stockList.find(s => s.id === stock.code);
                return {
                    ...stock,
                    name: info ? info.name : stock.code,
                    description: info ? info.description : ''
                };
            });
            
            let shuffled;
            if (shouldRandomize) {
                shuffled = [...displayStocks];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                currentDisplayStocks = shuffled;
            } else {
                if (currentDisplayStocks.length === displayStocks.length) {
                    shuffled = currentDisplayStocks.map(oldStock => {
                        const updated = displayStocks.find(s => s.code === oldStock.code);
                        return updated || oldStock;
                    });
                } else {
                    shuffled = [...displayStocks];
                    currentDisplayStocks = shuffled;
                }
            }
            
            grid.innerHTML = shuffled.map(stock => {
                const changeClass = stock.change_percent >= 0 ? 'positive' : 'negative';
                const changeSign = stock.change_percent >= 0 ? '+' : '';
                return `
                    <div class="card stock-card" data-code="${stock.code}">
                        <div class="stock-code">${escapeHtml(stock.code)}</div>
                        <div class="stock-name">${escapeHtml(stock.name)}</div>
                        <div class="stock-price">${stock.current_price.toFixed(2)} 𣿅元</div>
                        <div class="stock-change ${changeClass}">
                            ${changeSign}${stock.change_percent.toFixed(2)}%
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const code = card.getAttribute('data-code');
                    showStockDetail(code);
                });
            });
        }
        
        function performSearch() {
            const keyword = document.getElementById('stockSearchInput').value.toLowerCase().trim();
            if (!keyword) {
                renderStockGrid(false);
                return;
            }
            
            const filtered = stocksData.filter(stock => {
                const info = stockList.find(s => s.id === stock.code);
                const name = info ? info.name.toLowerCase() : '';
                const desc = info ? info.description.toLowerCase() : '';
                return stock.code.toLowerCase().includes(keyword) || 
                       name.includes(keyword) || 
                       desc.includes(keyword);
            });
            
            const grid = document.getElementById('stockGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">未找到匹配的公司</div>';
                return;
            }
            
            const displayStocks = filtered.map(stock => {
                const info = stockList.find(s => s.id === stock.code);
                return {
                    ...stock,
                    name: info ? info.name : stock.code,
                    description: info ? info.description : ''
                };
            });
            
            const sortedDisplay = currentDisplayStocks
                .filter(saved => displayStocks.some(d => d.code === saved.code))
                .map(saved => displayStocks.find(d => d.code === saved.code));
            
            grid.innerHTML = sortedDisplay.map(stock => {
                const changeClass = stock.change_percent >= 0 ? 'positive' : 'negative';
                const changeSign = stock.change_percent >= 0 ? '+' : '';
                return `
                    <div class="card stock-card" data-code="${stock.code}">
                        <div class="stock-code">${escapeHtml(stock.code)}</div>
                        <div class="stock-name">${escapeHtml(stock.name)}</div>
                        <div class="stock-price">${stock.current_price.toFixed(2)} 𣿅元</div>
                        <div class="stock-change ${changeClass}">
                            ${changeSign}${stock.change_percent.toFixed(2)}%
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const code = card.getAttribute('data-code');
                    showStockDetail(code);
                });
            });
            
            document.getElementById('searchSuggestions').style.display = 'none';
        }

                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) throw new Error('返回格式错误');
                const result = await response.json();
                if (result.success) {
                    holdingsData = result.data;
                    renderHoldings();
                }
            } catch (error) {
                console.error('加载持仓失败:', error);
                document.getElementById('holdingsContainer').innerHTML = '<div class="empty-holdings">加载持仓失败，请刷新页面重试</div>';

        function renderHoldings() {
            const container = document.getElementById('holdingsContainer');
            if (!holdingsData.length) {
                container.innerHTML = '<div class="empty-holdings">暂无持仓，快去购入股票吧！</div>';
                return;
            }
            
            let html = '<div class="holdings-grid">';
            
            for (const holding of holdingsData) {
                const stockInfo = stockList.find(s => s.id === holding.stock_code);
                const stockName = stockInfo ? stockInfo.name : holding.stock_code;
                
                // 买入总成本
                const totalCost = holding.buy_price * holding.remaining_shares;
                // 当前总市值
                const currentValue = holding.current_price * holding.remaining_shares;
                // 盈亏金额
                const profitAmount = currentValue - totalCost;
                // 盈亏百分比
                const profitPercent = (profitAmount / totalCost) * 100;
                
                // 安全解析日期
                let dateStr = '未知时间';
                try {
                    const buyDate = new Date(holding.created_at.replace(/-/g, '/'));
                    if (!isNaN(buyDate.getTime())) {
                        dateStr = `${buyDate.getMonth()+1}/${buyDate.getDate()} ${buyDate.getHours().toString().padStart(2,'0')}:${buyDate.getMinutes().toString().padStart(2,'0')}`;
                    } else {
                        dateStr = holding.created_at.substring(5, 16);
                    }
                } catch (e) {
                    dateStr = holding.created_at.substring(5, 16);
                }
                
                html += `
                    <div class="holding-card" data-holding-id="${holding.id}" data-stock-code="${holding.stock_code}">
                        <div class="holding-header">
                            <span class="holding-name">${escapeHtml(stockName)}</span>
                            <span class="holding-code">${escapeHtml(holding.stock_code)}</span>
                        </div>
                        <div class="holding-details">
                            <div class="holding-detail-item">
                                <span class="holding-detail-label">买入批次</span>
                                <span class="holding-detail-value">${dateStr}</span>
                            </div>
                            <div class="holding-detail-item">
                                <span class="holding-detail-label">买入价</span>
                                <span class="holding-detail-value">${parseFloat(holding.buy_price).toFixed(2)} 𣿅元</span>
                            </div>
                            <div class="holding-detail-item">
                                <span class="holding-detail-label">持有股数</span>
                                <span class="holding-detail-value">${parseFloat(holding.remaining_shares).toFixed(2)}</span>
                            </div>
                            <div class="holding-detail-item">
                                <span class="holding-detail-label">买入成本</span>
                                <span class="holding-detail-value">${totalCost.toFixed(2)} 𣿅元</span>
                            </div>
                            <div class="holding-detail-item">
                                <span class="holding-detail-label">当前市值</span>
                                <span class="holding-detail-value">${currentValue.toFixed(2)} 𣿅元</span>
                            </div>
                            <div class="holding-detail-item">
                                <span class="holding-detail-label">浮动盈亏</span>
                                <span class="holding-detail-value ${profitAmount >= 0 ? 'profit-positive' : 'profit-negative'}">
                                    ${profitAmount >= 0 ? '+' : ''}${profitAmount.toFixed(2)} 𣿅元 (${profitPercent >= 0 ? '+' : ''}${profitPercent.toFixed(2)}%)
                                </span>
                            </div>
                        </div>
                        <button class="sell-btn" data-holding-id="${holding.id}" data-stock-code="${holding.stock_code}" data-buy-price="${holding.buy_price}" data-shares="${holding.remaining_shares}">
                            <i class="fas fa-chart-line"></i> 售出此批次
                        </button>
                    </div>
                `;
            }
            html += '</div>';
            container.innerHTML = html;
            
            document.querySelectorAll('.sell-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const holdingId = parseInt(btn.getAttribute('data-holding-id'));
                    const stockCode = btn.getAttribute('data-stock-code');
                    const buyPrice = parseFloat(btn.getAttribute('data-buy-price'));
                    const maxShares = parseFloat(btn.getAttribute('data-shares'));
                    showSellDialog(holdingId, stockCode, buyPrice, maxShares);
                });
            });
        }

        async function loadAndDrawChart(code) {
            if (loadFailed) return;
            try {
                const response = await fetch(`https://dornhub.eu.org/php/stock_api.php?action=get_stock_history&code=${code}`);
                if (!response.ok) throw new Error('HTTP错误');
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) throw new Error('返回格式错误');
                const result = await response.json();
                if (result.success && result.data && result.data.length > 0) {
                    const history = result.data;
                    const labels = history.map(h => {
                        const date = new Date(h.created_at);
                        return `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                    });
                    const prices = history.map(h => parseFloat(h.price));
                    
                    const ctx = document.getElementById('stockChart').getContext('2d');
                    if (currentChart) {
                        currentChart.destroy();
                    }
                    currentChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: '股价 (𣿅元)',
                                data: prices,
                                borderColor: getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim() || '#16DA49',
                                backgroundColor: 'rgba(22, 218, 73, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            const searchInput = document.getElementById('stockSearchInput');
            const suggestionsDiv = document.getElementById('searchSuggestions');
            
            searchInput.addEventListener('input', function() {
                updateSearchSuggestions();
            });
            
            searchInput.addEventListener('blur', function() {
                setTimeout(() => {
                    suggestionsDiv.style.display = 'none';
                }, 200);
            });
            
            searchInput.addEventListener('focus', function() {
                if (this.value.trim()) {
                    updateSearchSuggestions();
                }
            });
            
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                    suggestionsDiv.style.display = 'none';
                }
            });
            
            document.getElementById('stockSearchBtn').addEventListener('click', performSearch);
            
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                    suggestionsDiv.style.display = 'none';
                }
            });
            
            document.getElementById('closeModalBtn').addEventListener('click', () => {
                document.getElementById('stockDetailModal').style.display = 'none';
                if (currentChart) {
                    currentChart.destroy();
                    currentChart = null;
                }
            });
            
            document.getElementById('modalBuyBtn').addEventListener('click', () => {
                if (!isLoggedIn) {
                    LoginModule.showLoginModal();
                    return;
                }
                currentTradeType = 'buy';
                document.getElementById('tradeInputLabel').textContent = '输入股数';
                document.getElementById('tradeSharesInput').value = '';
                document.getElementById('tradeInputArea').style.display = 'block';
            });
            
            document.getElementById('modalSellBtn').addEventListener('click', () => {
                if (!isLoggedIn) {
                    LoginModule.showLoginModal();
                    return;
                }
                currentTradeType = 'sell';
                const totalShares = currentHoldingsForStock.reduce((sum, h) => sum + parseFloat(h.remaining_shares), 0);
                document.getElementById('tradeInputLabel').textContent = `输入股数 (最多 ${totalShares.toFixed(2)} 股)`;
                document.getElementById('tradeSharesInput').value = '';
                document.getElementById('tradeSharesInput').max = totalShares;
                document.getElementById('tradeInputArea').style.display = 'block';
            });
            
            document.getElementById('cancelTradeBtn').addEventListener('click', () => {
                document.getElementById('tradeInputArea').style.display = 'none';
                currentTradeType = null;
            });
            
            document.getElementById('confirmTradeBtn').addEventListener('click', async () => {
                const shares = parseFloat(document.getElementById('tradeSharesInput').value);
                if (isNaN(shares) || shares <= 0) {
                    if (UI) UI.error('请输入有效的股数');
                    return;
                }
                if (currentTradeType === 'sell') {
                    const totalShares = currentHoldingsForStock.reduce((sum, h) => sum + parseFloat(h.remaining_shares), 0);
                    if (shares > totalShares) {
                        if (UI) UI.error('卖出数量超过持仓');
                        return;
                    }
                    const success = await executeSell(shares);
                    if (success) {
                        document.getElementById('tradeInputArea').style.display = 'none';
                        await loadAndDrawChart(currentStockCode);
                        const stockPrice = stocksData.find(s => s.code === currentStockCode);
                        if (stockPrice) {
                            document.getElementById('modalCurrentPrice').textContent = `${stockPrice.current_price.toFixed(2)} 𣿅元`;
                        }
                        const updatedHoldings = holdingsData.filter(h => h.stock_code === currentStockCode);
                        currentHoldingsForStock = updatedHoldings;
                        const newTotal = updatedHoldings.reduce((sum, h) => sum + parseFloat(h.remaining_shares), 0);
                        const holdingInfo = document.getElementById('modalHoldingInfo');
                        if (newTotal > 0) {
                            const avgPrice = updatedHoldings.reduce((sum, h) => sum + (parseFloat(h.buy_price) * parseFloat(h.remaining_shares)), 0) / newTotal;
                            holdingInfo.innerHTML = `📊 当前持有: ${newTotal.toFixed(2)} 股 | 成本均价: ${avgPrice.toFixed(2)} 𣿅元`;
                        } else {
                            holdingInfo.innerHTML = '📊 当前未持有此股票';
                        }
                    }
                } else if (currentTradeType === 'buy') {
                    const success = await executeBuy(shares);
                    if (success) {
                        document.getElementById('tradeInputArea').style.display = 'none';
                        await loadAndDrawChart(currentStockCode);
                        const stockPrice = stocksData.find(s => s.code === currentStockCode);
                        if (stockPrice) {
                            document.getElementById('modalCurrentPrice').textContent = `${stockPrice.current_price.toFixed(2)} 𣿅元`;
                        }
                        const updatedHoldings = holdingsData.filter(h => h.stock_code === currentStockCode);
                        currentHoldingsForStock = updatedHoldings;
                        const newTotal = updatedHoldings.reduce((sum, h) => sum + parseFloat(h.remaining_shares), 0);
                        const holdingInfo = document.getElementById('modalHoldingInfo');
                        if (newTotal > 0) {
                            const avgPrice = updatedHoldings.reduce((sum, h) => sum + (parseFloat(h.buy_price) * parseFloat(h.remaining_shares)), 0) / newTotal;
                            holdingInfo.innerHTML = `📊 当前持有: ${newTotal.toFixed(2)} 股 | 成本均价: ${avgPrice.toFixed(2)} 𣿅元`;
                        }
                    }
                }
                currentTradeType = null;
            });
            
            // 卖出对话框事件
            document.getElementById('closeSellDialogBtn').addEventListener('click', () => {
                document.getElementById('sellDialog').style.display = 'none';
                currentSellHoldingId = null;
                currentSellStockCode = null;
            });
            
            document.getElementById('cancelSellBtn').addEventListener('click', () => {
                document.getElementById('sellDialog').style.display = 'none';
                currentSellHoldingId = null;
                currentSellStockCode = null;
            });
            
            document.getElementById('confirmSellBtn').addEventListener('click', async () => {
                const shares = parseFloat(document.getElementById('sellSharesInput').value);
                if (isNaN(shares) || shares <= 0) {
                    if (UI) UI.error('请输入有效的股数');
                    return;
                }
                
                const maxShares = parseFloat(document.getElementById('sellMaxShares').textContent);
                if (shares > maxShares) {
                    if (UI) UI.error('卖出数量超过持仓');
                    return;
                }
                
                const success = await executeSellWithHoldingId(currentSellHoldingId, shares);
                if (success) {
                    document.getElementById('sellDialog').style.display = 'none';
                    currentSellHoldingId = null;
                    currentSellStockCode = null;
                    await loadHoldings();
                    await loadStocks();
                }
            });
            
            // 点击模态框外部关闭
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('stockDetailModal')) {
                    document.getElementById('stockDetailModal').style.display = 'none';
                }
                if (e.target === document.getElementById('sellDialog')) {
                    document.getElementById('sellDialog').style.display = 'none';
                    currentSellHoldingId = null;
                    currentSellStockCode = null;
                }
            });
            
            // 个人中心跳转
            document.getElementById('personalCenterBtn')?.addEventListener('click', () => {
                window.location.href = 'account.html';
            });
        }
        
        // ==================== 辅助函数 ====================
        function updateDateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('datetime').textContent = `${dateStr} ${timeStr}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
