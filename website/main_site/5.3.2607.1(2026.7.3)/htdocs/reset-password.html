<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/SatornhLogo.png">
    <title>重置密码 - Dorn Hub</title>
    
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.001/office-ui-fabric-core/11.1.0/css/fabric.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/resources/loading.css">
    <link rel="stylesheet" href="/resources/ui.css">
    <script src="/resources/loading.js"></script>
    <script src="/resources/ui.js"></script>
    <script src="/resources/cookie-consent.js"></script>
    
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .reset-container {
            max-width: 450px;
            width: 90%;
            margin: 0 auto;
            padding: 30px;
        }
        
        .reset-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .reset-header i {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .reset-header h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }
        
        .reset-header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            transition: all 0.3s var(--animation-curve);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(var(--primary-color-rgb), 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s var(--animation-curve);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: #106ebe;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: rgba(22, 218, 73, 0.15);
            border: 1px solid #16DA49;
            color: #16DA49;
            display: block;
        }
        
        .message.error {
            background: rgba(209, 52, 56, 0.15);
            border: 1px solid #d13438;
            color: #d13438;
            display: block;
        }
        
        .message.info {
            background: rgba(100, 153, 255, 0.15);
            border: 1px solid #6499FF;
            color: #6499FF;
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .reset-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="spinner-text">
            <span id="loading-text-1">Dorn</span>
            <span id="loading-text-2">&nbsp;Hub&nbsp;</span>
        </div>
        <br>
        <p>好东西就要来了……</p>
        <br>
        <div class="loading-spinner"></div>
        <br>
        <br>
        <button class="btn" id="stop-button">
            <i class="fas fa-stop-circle"></i> 中断加载
        </button>
        <p id="stop-text">* 页面加载时间过长时，可点击此按钮以中断加载。这会导致页面部分功能无法正常使用。</p>
    </div>

    <div class="reset-container section-container">
        <div class="reset-header">
            <i class="fas fa-lock-open"></i>
            <h2>重置密码</h2>
            <p id="pageDesc">请设置您的新密码</p>
        </div>
        
        <div class="form-group">
            <label for="newPassword">新密码</label>
            <input type="password" id="newPassword" placeholder="至少6位">
        </div>
        
        <div class="form-group">
            <label for="confirmPassword">确认新密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入">
        </div>
        
        <button class="btn btn-primary" id="resetBtn">
            <i class="fas fa-check"></i> 重置密码
        </button>
        
        <div id="message" class="message"></div>
        
        <div class="back-link">
            <a href="account.html"><i class="fas fa-arrow-left"></i> 返回登录</a>
        </div>
    </div>

    <script>
        // 获取URL参数中的token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const resetBtn = document.getElementById('resetBtn');
        const pageDesc = document.getElementById('pageDesc');
        const messageDiv = document.getElementById('message');
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
        }
        
        function hideMessage() {
            messageDiv.className = 'message';
            messageDiv.textContent = '';
        }
        
        // 验证token是否存在
        if (!token) {
            showMessage('无效的链接，请重新申请密码重置', 'error');
            resetBtn.disabled = true;
            pageDesc.textContent = '链接无效，请返回重新申请';
        }
        
        // 重置密码
        resetBtn.addEventListener('click', async function() {
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!newPassword || !confirmPassword) {
                showMessage('请填写新密码', 'error');
                return;
            }
            
            if (newPassword.length < 8) {
                showMessage('密码长度至少8位!	', 'error');
                return;
            }
			
			// 检查是否包含字母（大小写均可）
			const hasLetter = /[a-zA-Z]/.test(newPassword);
			// 检查是否包含数字
			const hasNumber = /\d/.test(newPassword);
			
			if (!hasLetter || !hasNumber) {
			    showMessage('密码必须同时包含字母和数字！请重新设置。\n示例：password123 或 Abc123456');
			    return;
			}
            
            if (newPassword !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }
            
            if (!token) {
                showMessage('无效的链接，请重新申请', 'error');
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 重置中...';
            hideMessage();
            
            try {
                const response = await fetch('php/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('密码重置成功！3秒后跳转到登录页面', 'success');
                    resetBtn.disabled = true;
                    newPasswordInput.disabled = true;
                    confirmPasswordInput.disabled = true;
                    setTimeout(function() {
                        window.location.href = 'account.html';
                    }, 3000);
                } else {
                    showMessage(data.error || '重置失败，请稍后重试', 'error');
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = '<i class="fas fa-check"></i> 重置密码';
                }
            } catch (error) {
                console.error('请求失败:', error);
                showMessage('网络错误，请稍后重试', 'error');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-check"></i> 重置密码';
            }
        });
        
        newPasswordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') resetBtn.click();
        });
        
        confirmPasswordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') resetBtn.click();
        });
        
        setTimeout(function() {
            var bgType = localStorage.getItem('backgroundType') || 'default';
            var customBg = localStorage.getItem('customBackground');
            if (bgType !== 'none' && !document.querySelector('.background-layer')) {
                var bgLayer = document.createElement('div');
                bgLayer.className = 'background-layer';
                bgLayer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:-1;pointer-events:none';
                if (bgType === 'default') bgLayer.style.backgroundImage = "url('flag.jpg')";
                else if (bgType === 'random') bgLayer.style.backgroundImage = "url('https://picsum.photos/1920/1080')";
                else if (bgType === 'custom' && customBg) bgLayer.style.backgroundImage = 'url(' + customBg + ')';
                if (bgLayer.style.backgroundImage) document.body.appendChild(bgLayer);
            }
        }, 100);
    </script>
</body>
</html>
