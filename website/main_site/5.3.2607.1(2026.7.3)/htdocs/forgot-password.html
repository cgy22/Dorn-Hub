<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/SatornhLogo.png">
    <title>忘记密码 - Dorn Hub</title>
    
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.001/office-ui-fabric-core/11.1.0/css/fabric.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/resources/loading.css">
    <link rel="stylesheet" href="/resources/ui.css">
    <script src="/resources/loading.js"></script>
    <script src="/resources/ui.js"></script>
    <script src="/resources/cookie-consent.js"></script>
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .forgot-container {
            max-width: 450px;
            width: 90%;
            margin: 0 auto;
            padding: 30px;
        }
        
        .forgot-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .forgot-header i {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .forgot-header h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
        }
        
        .forgot-header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            transition: all 0.3s var(--animation-curve);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(var(--primary-color-rgb), 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s var(--animation-curve);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: #106ebe;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }
        
        .message.success {
            background: rgba(22, 218, 73, 0.15);
            border: 1px solid #16DA49;
            color: #16DA49;
        }
        
        .message.error {
            background: rgba(209, 52, 56, 0.15);
            border: 1px solid #d13438;
            color: #d13438;
        }
        
        .message.info {
            background: rgba(100, 153, 255, 0.15);
            border: 1px solid #6499FF;
            color: #6499FF;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        /* Turnstile 容器样式 */
        .turnstile-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .forgot-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="loading-mask">
        <div class="spinner-text">
            <span id="loading-text-1">Dorn</span>
            <span id="loading-text-2">&nbsp;Hub&nbsp;</span>
        </div>
        <br>
        <p>好东西就要来了……</p>
        <br>
        <div class="loading-spinner"></div>
        <br>
        <br>
        <button class="btn" id="stop-button">
            <i class="fas fa-stop-circle"></i> 中断加载
        </button>
        <p id="stop-text">* 页面加载时间过长时，可点击此按钮以中断加载。这会导致页面部分功能无法正常使用。</p>
    </div>

    <div class="forgot-container section-container">
        <div class="forgot-header">
            <i class="fas fa-key"></i>
            <h2>忘记密码</h2>
            <p>输入您的身份证号，我们将向备用邮箱发送重置链接</p>
        </div>
        
        <div class="form-group">
            <label for="idNumber">𣿅国身份证号</label>
            <input type="text" id="idNumber" placeholder="请输入您的身份证号">
        </div>
        
        <!-- Cloudflare Turnstile 人机验证 -->
        <div class="turnstile-wrapper">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAAC2E9TsjP-02HPpE"></div>
        </div>
        
        <button class="btn btn-primary" id="sendResetBtn">
            <i class="fas fa-paper-plane"></i> 发送重置邮件
        </button>
        
        <div id="message" class="message" style="display: none;"></div>
        
        <div class="back-link">
            <a href="account.html"><i class="fas fa-arrow-left"></i> 返回登录</a>
        </div>
    </div>

    <script>
        const idNumberInput = document.getElementById('idNumber');
        const sendBtn = document.getElementById('sendResetBtn');
        const messageDiv = document.getElementById('message');
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        function hideMessage() {
            messageDiv.style.display = 'none';
        }
        
        // 重置 Turnstile
        function resetTurnstile() {
            if (typeof turnstile !== 'undefined') {
                turnstile.reset();
            }
        }
        
        sendBtn.addEventListener('click', async function() {
            const idNumber = idNumberInput.value.trim();
            
            if (!idNumber) {
                showMessage('请输入身份证号', 'error');
                return;
            }
            
            // 获取 Turnstile token
            const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;
            
            if (!turnstileToken) {
                showMessage('请完成人机验证', 'error');
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 验证中...';
            hideMessage();
            
            try {
                // 先验证 Turnstile
                const verifyResponse = await fetch('/php/verify_turnstile.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: turnstileToken })
                });
                
                const verifyResult = await verifyResponse.json();
                
                if (!verifyResult.success) {
                    showMessage('人机验证失败，请重试', 'error');
                    resetTurnstile();
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送重置邮件';
                    return;
                }
                
                // 验证通过，发送重置邮件
                sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
                
                const response = await fetch('/php/send_reset_email.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_number: idNumber })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ ' + (data.message || '重置邮件已发送，请查收您的邮箱'), 'success');
                    idNumberInput.value = '';
                    resetTurnstile();
                } else {
                    showMessage('❌ ' + (data.error || '发送失败，请稍后重试'), 'error');
                    resetTurnstile();
                }
            } catch (error) {
                console.error('请求失败:', error);
                showMessage('❌ 网络错误，请稍后重试', 'error');
                resetTurnstile();
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送重置邮件';
            }
        });
        
        idNumberInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendBtn.click();
        });
        
        setTimeout(() => {
            const bgType = localStorage.getItem('backgroundType') || 'default';
            const customBg = localStorage.getItem('customBackground');
            if (bgType !== 'none' && !document.querySelector('.background-layer')) {
                const bgLayer = document.createElement('div');
                bgLayer.className = 'background-layer';
                bgLayer.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:-1;pointer-events:none`;
                if (bgType === 'default') bgLayer.style.backgroundImage = "url('flag.jpg')";
                else if (bgType === 'random') bgLayer.style.backgroundImage = "url('https://picsum.photos/1920/1080')";
                else if (bgType === 'custom' && customBg) bgLayer.style.backgroundImage = `url('${customBg}')`;
                if (bgLayer.style.backgroundImage) document.body.appendChild(bgLayer);
            }
        }, 100);
    </script>
</body>
</html>
