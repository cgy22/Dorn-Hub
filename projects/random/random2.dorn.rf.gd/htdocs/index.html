    <style>

            background-color: rgb(102, 153, 255);
            border-radius: 10px;
            font-family: Microsoft Yahei;

        #inp {

        #challengeSlider::-webkit-slider-thumb {

            border-radius: 50%;

        }
        #challengeSlider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            background: white;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #000;
        }
        #probabilitySliderContainer {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        #probabilitySlider {
            width: 80%;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            background: white;
            outline: none;
            opacity: 0.7;
            transition: opacity .15s ease-in-out;
        }
        #probabilitySlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            background: white;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #000;
        }
        #probabilitySlider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            background: white;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #000;
        }
        #closeSlider {
            cursor: pointer;
            color: white;
            font-size: 20px;
            margin-left: 10px;
        }
    </style>
    <link rel="stylesheet" href="css/style1.css">
</head>
<body>
<nav>
    <div class="menu">
        <span id="navname1">Dorn</span>
        <span id="navname2">&nbsp;Hub&nbsp;</span>
        <div class="menu_links">
            <a href="index.html" class="link">随机抽号器</a>
            <a href="index2.html" class="link">随机抽皓器</a>

</nav>
<section class="wrapper">
    <div class="container">
    
    		<div id="scene" class="scene" data-hover-only="false">
    
    
    			<div class="circle" data-depth="1.2"></div>
    			
    
    			<div class="one" data-depth="0.9">
    				<div class="content">
    					<!--<span class="piece"></span>
    					<span class="piece"></span>
    					<span class="piece"></span>-->
    				</div>
    			</div>
    			
    			<div class="one" data-depth="0.9">
    				<div class="content" style="width: 10px; height: 10px; display: flex; justify-content: center; align-items: center; position: absolute; top: 50%; left: calc(50% + 400px); transform: translate(-50%, -50%)";
    }">
    					<!--<span class="piece"></span>
    					<span class="piece"></span>
    					<span class="piece"></span>-->
    				</div>
    			</div>
    			
    
    			<div class="two" data-depth="0.60">
    				<div class="content">
    					<!--<span class="piece"></span>
    					<span class="piece"></span>
    					<span class="piece"></span>-->
    				</div>
    			</div>
    
    			<div class="three" data-depth="0.40">
    				<div class="content">
    					<!--<span class="piece"></span>
    					<span class="piece"></span>
    					<span class="piece"></span>-->
    				</div>
    			</div>
    
    			<p class="p404" data-depth="0.50" style="font-size:100px;" id="number">请抽号</p>
    			<p class="p404" data-depth="0.10" style="font-size:100px;" id="number1">请抽号</p>
    
    		</div>
        <div class="text">
            <article>
                <div align="center">
                    <p style="font-size: 20px;">号数：1~<input id="inp" value="53" oninput="resetChouhao()"/></p>
                </div>
                <button id="ch" onclick="toggleChouhao();" style="font-size: 20px;">抽号</button>
                <div id="sliderContainer">
                    <label for="challengeSlider" style="font-size: 20px; color: white;">挑战性：</label>
                    <input type="range" id="challengeSlider" min="10" max="100" value="1" />
                </div>
                <div id="probabilitySliderContainer">
                    <label for="probabilitySlider" style="font-size: 20px; color: white;">抽取45号概率：</label>
                    <input type="range" id="probabilitySlider" min="0" max="100" value="20" />
                    <span id="closeSlider" onclick="hideProbabilitySlider()">X</span>
                </div>
            </article>
        </div>
    </div>
</section>
<script src='js/jquery.min.js'></script>
<script>
var intervalId;
var speed = 100;
var probabilityOf45 = 0.05;
var unlockSequence = ['T', 'O', 'N', 'H'];
var userSequence = [];

function resetChouhao() {
    document.getElementById("number").innerHTML = "请抽号";
    document.getElementById("number1").innerHTML = "请抽号";
    clearInterval(intervalId);
    document.getElementById("ch").innerHTML = "抽号";
    document.getElementById("ch").onclick = toggleChouhao;
}

function toggleChouhao() {
    var btn = document.getElementById("ch");
    if (btn.innerHTML === "抽号") {
        startChouhao();
    } else {
        stopChouhao();
    }
}

function startChouhao() {
    var maxNumber = parseInt(document.getElementById("inp").value);
    intervalId = setInterval(function() {
        var randomNumber;
        if (Math.random() < probabilityOf45) {
            randomNumber = 45;
        } else {
            randomNumber = Math.floor(Math.random() * maxNumber) + 1;
        }
        document.getElementById("number").innerHTML = randomNumber;
        document.getElementById("number1").innerHTML = randomNumber;
    }, speed);
    document.getElementById("ch").innerHTML = "停止";
}

function stopChouhao() {
    clearInterval(intervalId);
    document.getElementById("ch").innerHTML = "抽号";
}

document.getElementById('challengeSlider').addEventListener('input', function() {
    speed = 1000 / this.value;
});

document.getElementById('probabilitySlider').addEventListener('input', function() {
    probabilityOf45 = this.value / 100;
});

document.addEventListener('keydown', function(event) {
    userSequence.push(event.key.toUpperCase());
    if (userSequence.length > unlockSequence.length) {
        userSequence.shift();
    }
    if (JSON.stringify(userSequence) === JSON.stringify(unlockSequence)) {
        document.getElementById('probabilitySliderContainer').style.display = 'block';
    }
});

function hideProbabilitySlider() {
    document.getElementById('probabilitySliderContainer').style.display = 'none';
}
</script>
</body>
</html>
